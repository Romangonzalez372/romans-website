<script>
let tasks=[];

/* ---------- TIME ENGINE (FIXED BUFFER MODEL) ---------- */
function recalc(){
  let time = 0;

  for(let i = 0; i < tasks.length; i++){
    const t = tasks[i];

    if(t.done){
      t.start = null;
      continue;
    }

    t.start = time;

    const duration = Number(t.duration);
    const buffer = Number(t.buffer);

    time += duration;

    // buffer applies AFTER task, affects NEXT task
    time += buffer;
  }
}

/* ---------- FORMAT ---------- */
function format(min){
  if(min==null) return '';
  if(min < 60) return `in ${min}m`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m === 0 ? `in ${h}h` : `in ${h}h ${m}m`;
}

/* ---------- ADD ---------- */
function addTask(){
  const i=document.getElementById('input');
  const d=document.getElementById('duration');
  const b=document.getElementById('buffer');

  if(!i.value.trim()) return;

  tasks.push({
    id: Date.now() + Math.random(),
    title: i.value,
    duration: +d.value,
    buffer: +b.value,
    done: false
  });

  i.value='';
  recalc();
  render();
}

/* ---------- TOGGLE ---------- */
function toggle(id){
  const t = tasks.find(x=>x.id===id);
  if(t) t.done = !t.done;

  recalc();
  render();
}

/* ---------- SAFE EDIT (ONLY ON ENTER/BLUR) ---------- */
function commitUpdate(id, field, el){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;

  const val = el.value;

  if(field === 'title') t.title = val;
  if(field === 'duration') t.duration = Math.max(5, +val || 5);
  if(field === 'buffer') t.buffer = Math.max(0, +val || 0);

  recalc();
  render();
}

/* ---------- DRAG ---------- */
let drag=null;

function dragStart(id){ drag=id; }

function allow(e){ e.preventDefault(); }

function drop(id){
  if(drag===null || drag===id) return;

  const a = tasks.findIndex(t=>t.id===drag);
  const b = tasks.findIndex(t=>t.id===id);

  const item = tasks.splice(a,1)[0];
  tasks.splice(b,0,item);

  drag=null;
  recalc();
  render();
}

/* ---------- RENDER ---------- */
function render(){
  const list=document.getElementById('list');

  if(!tasks.length){
    list.innerHTML='no tasks';
    return;
  }

  list.innerHTML = tasks.map(t=>`
    <div class="task"
      draggable="true"
      ondragstart="dragStart(${t.id})"
      ondragover="allow(event)"
      ondrop="drop(${t.id})">

      <div class="check ${t.done?'active':''}" onclick="toggle(${t.id})"></div>

      <div class="content">

        <div class="time">${format(t.start)}</div>

        <input class="title"
          value="${t.title}"
          onkeydown="if(event.key==='Enter'){this.blur()}"
          onblur="commitUpdate(${t.id},'title',this)">

        <div class="row">
          <input class="small"
            value="${t.duration}"
            onkeydown="if(event.key==='Enter'){this.blur()}"
            onblur="commitUpdate(${t.id},'duration',this)">m

          <input class="small"
            value="${t.buffer}"
            onkeydown="if(event.key==='Enter'){this.blur()}"
            onblur="commitUpdate(${t.id},'buffer',this)">b
        </div>

      </div>

      <div class="drag">≡</div>
    </div>
  `).join('');
}

document.getElementById('input').addEventListener('keydown',e=>{
  if(e.key==='Enter') addTask();
});

render();
</script>
