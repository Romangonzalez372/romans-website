<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPilot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0f0f10;
  --card:#18181a;
  --text:#f5f5f5;
  --muted:#7a7a7a;
  --accent:#9eff6b;
}

body{
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:40px 20px;
}

.container{max-width:480px;width:100%;}

.header{margin-bottom:20px;}
.logo{font-weight:500;}
.logo span{color:var(--accent);}

.input-wrap{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  background:var(--card);
  border:none;
  padding:14px;
  border-radius:12px;
  color:white;
  outline:none;
}

button{
  background:var(--accent);
  border:none;
  padding:0 16px;
  border-radius:12px;
  cursor:pointer;
}

.task{
  background:var(--card);
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
}

.task.done{opacity:0.35;}

.check{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--muted);
  cursor:pointer;
}

.check.active{
  background:var(--accent);
  border-color:var(--accent);
}

.content{flex:1;}

.title{font-size:14px;}

.meta{
  font-size:12px;
  color:var(--muted);
  display:flex;
  gap:10px;
  align-items:center;
}

/* duration input */
.duration{
  width:50px;
  background:transparent;
  border:none;
  color:var(--accent);
  font-size:12px;
}

.empty{
  text-align:center;
  color:var(--muted);
  margin-top:60px;
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="logo">Auto<span>Pilot</span></div>
  </div>

  <div class="input-wrap">
    <input id="input" placeholder="Add task...">
    <button onclick="addTask()">+</button>
  </div>

  <div id="list"></div>

</div>

<script>
const tasks = [];

/* -------- FORMAT TIME -------- */

function format(min){
  if(min < 60) return `in ${min}m`;
  const h = Math.floor(min/60);
  const m = min%60;
  if(m===0) return `in ${h}h`;
  return `in ${h}h ${m}m`;
}

/* -------- REBUILD TIMELINE -------- */

function recalcTimes(){
  let current = 0;

  tasks.forEach(t=>{
    if(!t.done){
      t.start = current;
      current += t.duration;
    }
  });
}

/* -------- SCHEDULER -------- */

function schedule(text){
  let duration = 30;

  const t = text.toLowerCase();

  if(t.includes('study')) duration = 60;
  if(t.includes('clean')) duration = 45;
  if(t.includes('quick')) duration = 15;

  return {
    id: Date.now(),
    title: text,
    duration,
    start: 0,
    done: false
  };
}

/* -------- ACTIONS -------- */

function addTask(){
  const input = document.getElementById('input');
  if(!input.value.trim()) return;

  tasks.push(schedule(input.value));
  input.value='';

  recalcTimes();
  render();
}

function toggle(id){
  const t = tasks.find(x=>x.id===id);
  if(t) t.done = !t.done;

  recalcTimes();
  render();
}

function updateDuration(id, val){
  const t = tasks.find(x=>x.id===id);
  if(t){
    t.duration = Math.max(5, parseInt(val) || 5);
  }

  recalcTimes();
  render();
}

/* -------- RENDER -------- */

function render(){
  const list = document.getElementById('list');

  if(tasks.length===0){
    list.innerHTML='<div class="empty">no tasks</div>';
    return;
  }

  list.innerHTML = tasks.map(t=>`
    <div class="task ${t.done?'done':''}">
      <div class="check ${t.done?'active':''}" onclick="toggle(${t.id})"></div>

      <div class="content">
        <div class="title">${t.title}</div>
        <div class="meta">
          ${format(t.start)}
          •
          <input class="duration" value="${t.duration}" 
            onchange="updateDuration(${t.id}, this.value)">m
        </div>
      </div>
    </div>
  `).join('');
}

document.getElementById('input').addEventListener('keydown', e=>{
  if(e.key==='Enter') addTask();
});

render();
</script>
</body>
</html>
