<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPilot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:Inter,sans-serif;
  background:#0f0f10;
  color:#fff;
  display:flex;
  justify-content:center;
  padding:40px 20px;
}

.container{width:100%;max-width:520px;}

.input{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

input,select{
  background:#18181a;
  border:none;
  border-radius:12px;
  padding:10px;
  color:white;
  outline:none;
}

input.main{flex:1;}

button{
  background:#9eff6b;
  border:none;
  border-radius:12px;
  padding:0 14px;
  cursor:pointer;
}

/* TASK */
.task{
  background:#18181a;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  display:flex;
  gap:10px;
  align-items:flex-start;
  cursor:grab;
}

.check{
  width:18px;height:18px;
  border-radius:50%;
  border:2px solid #666;
  cursor:pointer;
  margin-top:4px;
  flex-shrink:0;
}

.check.active{
  background:#9eff6b;
  border-color:#9eff6b;
}

.content{flex:1;display:flex;flex-direction:column;gap:6px;}

.time{
  font-size:13px;
  color:#9eff6b;
  font-weight:500;
}

.title{
  width:100%;
  background:transparent;
  border:none;
  color:white;
  font-size:14px;
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  font-size:11px;
  color:#777;
}

.small{
  width:50px;
  background:transparent;
  border:none;
  color:#aaa;
  font-size:11px;
}

.drag{
  color:#555;
  font-size:12px;
  margin-top:4px;
}
</style>
</head>

<body>
<div class="container">
<div style="margin-bottom:18px;">
  <div style="font-size:18px;font-weight:500;letter-spacing:0.3px;">
    AutoPilot
  </div>
  <div style="font-size:12px;color:#777;margin-top:4px;">
    time-based task scheduler
  </div>
</div>
  <div class="input">
    <input id="input" class="main" placeholder="Add task...">

    <select id="duration">
      <option value="15">15m</option>
      <option value="30" selected>30m</option>
      <option value="45">45m</option>
      <option value="60">60m</option>
    </select>

    <select id="buffer">
      <option value="0">0m</option>
      <option value="5">5m</option>
      <option value="10" selected>10m</option>
      <option value="15">15m</option>
    </select>

    <button onclick="addTask()">+</button>
  </div>

  <div id="list"></div>

</div>

<script>
let tasks = [];

/* ---------- CORE TIMELINE (STABLE) ---------- */
function recalc(){
  let time = 0;

  for(let i=0;i<tasks.length;i++){
    const t = tasks[i];

    if(t.done){
      t.start = null;
      continue;
    }

    t.start = time;

    time += Number(t.duration);
    time += Number(t.buffer);
  }
}

/* ---------- FORMAT ---------- */
function format(min){
  if(min == null) return '';
  if(min < 60) return `in ${min}m`;
  const h = Math.floor(min/60);
  const m = min % 60;
  return m === 0 ? `in ${h}h` : `in ${h}h ${m}m`;
}

/* ---------- ADD TASK ---------- */
function addTask(){
  const i = document.getElementById('input');
  const d = document.getElementById('duration');
  const b = document.getElementById('buffer');

  if(!i.value.trim()) return;

  tasks.push({
    id: Date.now() + Math.random(),
    title: i.value,
    duration: +d.value,
    buffer: +b.value,
    done: false
  });

  i.value = '';
  recalc();
  render();
}

/* ---------- TOGGLE ---------- */
function toggle(id){
  const t = tasks.find(x=>x.id===id);
  if(t) t.done = !t.done;

  recalc();
  render();
}

/* ---------- SAFE EDIT (ENTER / BLUR ONLY) ---------- */
function commit(id, field, el){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;

  const val = el.value;

  if(field === 'title') t.title = val;
  if(field === 'duration') t.duration = Math.max(5, +val || 5);
  if(field === 'buffer') t.buffer = Math.max(0, +val || 0);

  recalc();
  render();
}

/* ---------- DRAG ---------- */
let dragId = null;

function dragStart(id){ dragId = id; }

function allow(e){ e.preventDefault(); }

function drop(id){
  if(dragId === null || dragId === id) return;

  const from = tasks.findIndex(t=>t.id===dragId);
  const to = tasks.findIndex(t=>t.id===id);

  const item = tasks.splice(from,1)[0];
  tasks.splice(to,0,item);

  dragId = null;
  recalc();
  render();
}

/* ---------- RENDER ---------- */
function render(){
  const list = document.getElementById('list');

  if(tasks.length === 0){
    list.innerHTML = '';
    return;
  }

  list.innerHTML = tasks.map(t=>`
    <div class="task"
      draggable="true"
      ondragstart="dragStart(${t.id})"
      ondragover="allow(event)"
      ondrop="drop(${t.id})">

      <div class="check ${t.done?'active':''}" onclick="toggle(${t.id})"></div>

      <div class="content">

        <div class="time">${format(t.start)}</div>

        <input class="title"
          value="${t.title}"
          onkeydown="if(event.key==='Enter'){this.blur()}"
          onblur="commit(${t.id},'title',this)">

        <div class="row">
          <input class="small"
            value="${t.duration}"
            onkeydown="if(event.key==='Enter'){this.blur()}"
            onblur="commit(${t.id},'duration',this)">m

          <input class="small"
            value="${t.buffer}"
            onkeydown="if(event.key==='Enter'){this.blur()}"
            onblur="commit(${t.id},'buffer',this)">b
        </div>

      </div>

      <div class="drag">≡</div>
    </div>
  `).join('');
}

document.getElementById('input').addEventListener('keydown', e=>{
  if(e.key === 'Enter') addTask();
});

render();
</script>

</body>
</html>
